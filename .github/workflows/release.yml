name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and ZIP
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build installer and ZIP
        shell: bash
        run: |
          ./gradlew --no-daemon buildInstaller distZip
          ls -lah build/windows-installer || true
          ls -lah build/distributions || true

      - name: Resolve artifacts
        id: resolve
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = 'build/windows-installer/MisterWhisper_Installer.exe'
          if (!(Test-Path $exe)) { throw "Missing installer EXE at $exe" }

          $zips = Get-ChildItem -Path 'build/distributions' -Filter '*.zip' -ErrorAction Stop
          if ($zips.Count -ge 1) {
            $zip = $zips[0].FullName
          } else {
            throw "No distribution zip found in build/distributions"
          }

          "exe=$exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding ascii

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $out = 'build/SHA256SUMS.txt'
          $exePath = "${{ steps.resolve.outputs.exe }}"
          $zipPath = "${{ steps.resolve.outputs.zip }}"
          $h1 = (Get-FileHash $exePath -Algorithm SHA256).Hash + "  $exePath"
          $h2 = (Get-FileHash $zipPath -Algorithm SHA256).Hash + "  $zipPath"
          Set-Content -Path $out -Value $h1 -Encoding ascii
          Add-Content -Path $out -Value $h2 -Encoding ascii
          Get-Content $out

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.resolve.outputs.exe }}
            ${{ steps.resolve.outputs.zip }}
            build/SHA256SUMS.txt