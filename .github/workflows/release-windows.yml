name: Windows Installer Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install NSIS (makensis)
        run: choco install nsis -y
        shell: powershell

      - name: Verify tools
        shell: powershell
        run: |
          makensis -VERSION
          java -version
          javac -version

      - name: Create minimal runtime (JRE) with jlink
        shell: bash
        run: |
          jlink \
            --add-modules java.base,java.desktop,java.logging,java.prefs \
            --output jre \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2
          ls -la jre || dir jre

      - name: Build Windows installer
        shell: cmd
        run: |
          .\gradlew.bat --no-daemon buildInstaller

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MisterWhisper_Installer
          path: build/windows-installer/MisterWhisper_Installer.exe

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows-installer/MisterWhisper_Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: MisterWhisper ${{ inputs.tag }}
          files: |
            build/windows-installer/MisterWhisper_Installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}